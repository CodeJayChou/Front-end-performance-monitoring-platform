name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: monitor
          POSTGRES_DB: monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monitor -d monitor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://monitor:monitor@localhost:5432/monitor
      TEST_DATABASE_URL: postgres://monitor:monitor@localhost:5432/monitor
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Migrate Test Database
        run: pnpm --filter @monitor/ingest-gateway db:migrate

      - name: Test
        run: pnpm test

      - name: Smoke build demo-web
        run: pnpm --filter @monitor/demo-web build
