<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web-sdk 流程触发页</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        max-width: 960px;
      }
      h1 { font-size: 20px; }
      p.hint { color: #888; margin-top: 0; }
      .btns { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
      button {
        padding: 10px 16px;
        font-size: 14px;
        border: 1px solid #8884;
        border-radius: 8px;
        background: #6b8afd22;
        cursor: pointer;
      }
      button:hover { background: #6b8afd44; }
      #clear { background: #8881; }
      #log {
        background: #0b0f19;
        color: #c8d3f5;
        padding: 16px;
        border-radius: 10px;
        height: 420px;
        overflow: auto;
        font: 12px/1.6 ui-monospace, "Cascadia Code", monospace;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .stage { color: #7ee787; }
      .drop { color: #ff7b72; }
      .meta { color: #79c0ff; }
    </style>
  </head>
  <body>
    <h1>web-sdk 流程触发页</h1>
    <p class="hint">
      点击按钮触发真实浏览器信号，观察事件穿过链路：<br />
      <code>integration → scope → middleware:* → transport</code>。<br />
      日志同时输出到下方面板和浏览器 DevTools Console。
    </p>

    <div class="btns">
      <button id="err">抛未捕获错误 (window.onerror)</button>
      <button id="reject">未处理 Promise rejection</button>
      <button id="fetch-ok">fetch 成功 (200)</button>
      <button id="fetch-fail">fetch 失败 (网络错误)</button>
      <button id="resource-err">资源加载失败 (img 404)</button>
      <button id="custom">自定义事件 capture()</button>
      <button id="clear">清空日志</button>
    </div>

    <div id="log"></div>

    <script type="module" src="/src/browser.ts"></script>
  </body>
</html>
